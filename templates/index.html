<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skies — Weather Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sky: #0a0f1e;
            --sky2: #0d1528;
            --panel: rgba(255,255,255,0.04);
            --panel-border: rgba(255,255,255,0.08);
            --accent: #4fc3f7;
            --accent2: #81d4fa;
            --warm: #ffb74d;
            --text: #e8f0fe;
            --muted: rgba(232,240,254,0.45);
            --radius: 20px;
            --glow: 0 0 40px rgba(79,195,247,0.12);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--sky);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 10%, rgba(79,195,247,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(129,212,250,0.05) 0%, transparent 50%),
                radial-gradient(ellipse 40% 60% at 50% 50%, rgba(10,15,30,0) 0%, rgba(5,8,18,0.8) 100%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 48px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .logo span { color: var(--accent); }

        .unit-toggle {
            display: flex;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 100px;
            padding: 4px;
            gap: 2px;
        }

        .unit-btn {
            padding: 8px 18px;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            background: transparent;
            color: var(--muted);
        }

        .unit-btn.active {
            background: var(--accent);
            color: var(--sky);
        }

        .search-section { margin-bottom: 36px; }

        .search-bar {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 16px 24px;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 100px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input::placeholder { color: var(--muted); }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,195,247,0.12);
        }

        .search-btn {
            padding: 16px 32px;
            background: var(--accent);
            color: var(--sky);
            border: none;
            border-radius: 100px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .search-btn:hover {
            background: var(--accent2);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(79,195,247,0.25);
        }

        .saved-cities {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .city-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 14px;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 100px;
            font-size: 13px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .city-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .city-chip .remove-btn {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 0;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .city-chip .remove-btn:hover { opacity: 1; }

        .error-msg {
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.25);
            border-radius: var(--radius);
            padding: 16px 24px;
            color: #ff8a80;
            margin-bottom: 24px;
            display: none;
        }

        /* Severe weather alert banner */
        .alerts-container {
            display: none;
            margin-bottom: 16px;
        }

        .alert-banner {
            background: rgba(255, 160, 0, 0.1);
            border: 1px solid rgba(255, 160, 0, 0.35);
            border-radius: var(--radius);
            padding: 16px 24px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .alert-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
            color: #ffb74d;
        }

        .alert-icon { font-size: 18px; }

        .alert-body {
            display: none;
            margin-top: 12px;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
            border-top: 1px solid rgba(255,160,0,0.2);
            padding-top: 12px;
        }

        .alert-banner.open .alert-body { display: block; }

        .weather-result { display: none; }

        .current-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 24px;
            align-items: center;
            margin-bottom: 16px;
            box-shadow: var(--glow);
            position: relative;
            overflow: hidden;
        }

        .current-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(79,195,247,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .city-name {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .main-temp {
            font-family: 'Syne', sans-serif;
            font-size: clamp(64px, 10vw, 96px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -3px;
            margin-bottom: 8px;
        }

        .weather-desc {
            font-size: 18px;
            color: var(--muted);
            font-weight: 300;
            margin-bottom: 24px;
            text-transform: capitalize;
        }

        .feels-like {
            font-size: 14px;
            color: var(--muted);
        }

        .weather-icon-wrap img {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 0 20px rgba(79,195,247,0.4));
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: border-color 0.2s;
        }

        .stat-card:hover { border-color: rgba(79,195,247,0.3); }

        .stat-label {
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
        }

        .stat-unit {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }

        .save-btn {
            background: transparent;
            border: 1px solid var(--panel-border);
            color: var(--muted);
            padding: 10px 20px;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 24px;
        }

        .save-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .forecast-title {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .forecast-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 20px 12px;
            text-align: center;
            transition: all 0.2s;
        }

        .forecast-card:hover {
            border-color: rgba(79,195,247,0.3);
            transform: translateY(-2px);
        }

        .forecast-card:first-child {
            border-color: rgba(79,195,247,0.3);
            background: rgba(79,195,247,0.05);
        }

        .forecast-date {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .forecast-icon img { width: 44px; height: 44px; }

        .forecast-temps {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            margin-top: 8px;
        }

        .forecast-min {
            font-size: 13px;
            color: var(--muted);
            font-weight: 400;
        }

        .forecast-desc {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
            text-transform: capitalize;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 60px;
            color: var(--muted);
        }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 2px solid var(--panel-border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .weather-result.visible {
            display: block;
            animation: fadeUp 0.4s ease;
        }

        @media (max-width: 700px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .forecast-grid { grid-template-columns: repeat(3, 1fr); }
            .current-card { grid-template-columns: 1fr; }
            .weather-icon-wrap { display: none; }
        }

        @media (max-width: 480px) {
            .forecast-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">skies<span>.</span></div>
        <div class="unit-toggle">
            <button class="unit-btn active" data-unit="imperial">°F</button>
            <button class="unit-btn" data-unit="metric">°C</button>
        </div>
    </header>

    <div class="search-section">
        <div class="search-bar">
            <input type="text" class="search-input" id="cityInput" placeholder="Search any city in the world... e.g. Topeka, KS, US" autocomplete="off" />
            <button class="search-btn" id="searchBtn">Search</button>
        </div>
        <!-- Saved city chips rendered here by Flask and updated dynamically by JS -->
        <div class="saved-cities" id="savedCities">
            {% for city in saved_cities %}
            <div class="city-chip" data-city="{{ city }}">
                <span onclick="searchCity('{{ city }}')">{{ city }}</span>
                <button class="remove-btn" onclick="removeCity(event, '{{ city }}')" title="Remove">×</button>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Error message shown when a city search fails -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Loading spinner shown while fetching data -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>Fetching weather data…</p>
    </div>

    <!-- Severe weather alert banners, hidden until alerts are returned -->
    <div class="alerts-container" id="alertsContainer"></div>

    <!-- Main weather result section, hidden until a search is made -->
    <div class="weather-result" id="weatherResult">
        <div class="current-card">
            <div>
                <div class="city-name" id="cityDisplay"></div>
                <div class="main-temp" id="mainTemp"></div>
                <div class="weather-desc" id="weatherDesc"></div>
                <div class="feels-like" id="feelsLike"></div>
            </div>
            <div class="weather-icon-wrap">
                <img id="weatherIcon" src="" alt="" />
            </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:8px;">
            <button class="save-btn" id="saveBtn" onclick="saveCurrentCity()">
                <span>☆</span> Save City
            </button>
        </div>

        <!-- Stats grid: humidity, wind, visibility, pressure -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Humidity</div>
                <div class="stat-value" id="humidity"></div>
                <div class="stat-unit">percent</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Wind</div>
                <div class="stat-value" id="wind"></div>
                <div class="stat-unit" id="windUnit"></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Visibility</div>
                <div class="stat-value" id="visibility"></div>
                <div class="stat-unit">km</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pressure</div>
                <div class="stat-value" id="pressure"></div>
                <div class="stat-unit">hPa</div>
            </div>
        </div>

        <!-- 5-day forecast cards -->
        <div>
            <div class="forecast-title">5-Day Forecast</div>
            <div class="forecast-grid" id="forecastGrid"></div>
        </div>
    </div>
</div>

<script>
    // Track the current unit system and last searched city
    let currentUnits = 'imperial';
    let currentCity = '';

    const cityInput = document.getElementById('cityInput');
    const searchBtn = document.getElementById('searchBtn');
    const errorMsg = document.getElementById('errorMsg');
    const loading = document.getElementById('loading');
    const weatherResult = document.getElementById('weatherResult');

    // Trigger search on Enter key press
    cityInput.addEventListener('keydown', e => { if (e.key === 'Enter') fetchWeather(); });

    // Trigger search on button click
    searchBtn.addEventListener('click', () => fetchWeather());

    // Handle unit toggle between °F and °C
    document.querySelectorAll('.unit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentUnits = btn.dataset.unit;
            // Re-fetch weather in new units if a city is already displayed
            if (currentCity) fetchWeather(currentCity);
        });
    });

    // Called when a saved city chip is clicked
    function searchCity(city) {
        cityInput.value = city;
        fetchWeather(city);
    }

    // Fetches weather data from the Flask backend
    function fetchWeather(cityOverride) {
        const city = cityOverride || cityInput.value.trim();
        if (!city) return;

        // Hide previous results and show loading spinner
        errorMsg.style.display = 'none';
        loading.style.display = 'block';
        weatherResult.classList.remove('visible');

        fetch(`/weather?city=${encodeURIComponent(city)}&units=${currentUnits}`)
            .then(res => res.json())
            .then(data => {
                loading.style.display = 'none';
                if (data.error) {
                    errorMsg.textContent = data.error;
                    errorMsg.style.display = 'block';
                    return;
                }
                // Save the searched city name for use by the save button
                currentCity = city;
                renderWeather(data);
            })
            .catch(() => {
                loading.style.display = 'none';
                errorMsg.textContent = 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
            });
    }

    // Populates the weather result section with data from the API
    function renderWeather(data) {
        document.getElementById('cityDisplay').textContent = `${data.city}, ${data.country}`;
        document.getElementById('mainTemp').textContent = `${data.temp}${data.unit_symbol}`;
        document.getElementById('weatherDesc').textContent = data.description;
        document.getElementById('feelsLike').textContent = `Feels like ${data.feels_like}${data.unit_symbol}`;
        document.getElementById('weatherIcon').src = `https://openweathermap.org/img/wn/${data.icon}@2x.png`;
        document.getElementById('humidity').textContent = `${data.humidity}%`;
        document.getElementById('wind').textContent = data.wind_speed;
        document.getElementById('windUnit').textContent = data.wind_unit;
        document.getElementById('visibility').textContent = data.visibility;
        document.getElementById('pressure').textContent = data.pressure;

        renderForecast(data.forecast, data.unit_symbol);
        renderAlerts(data.alerts || []);

        // Show the result section with a fade-up animation
        weatherResult.classList.add('visible');
    }

    // Builds the 5-day forecast cards from the forecast data array
    function renderForecast(forecast, unitSymbol) {
        const grid = document.getElementById('forecastGrid');
        grid.innerHTML = '';
        forecast.forEach((day, i) => {
            const date = new Date(day.date + 'T12:00:00');
            const label = i === 0 ? 'Today' : date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            grid.innerHTML += `
                <div class="forecast-card">
                    <div class="forecast-date">${label}</div>
                    <div class="forecast-icon">
                        <img src="https://openweathermap.org/img/wn/${day.icon}@2x.png" alt="${day.description}" />
                    </div>
                    <div class="forecast-temps">${day.max_temp}${unitSymbol} <span class="forecast-min">/ ${day.min_temp}${unitSymbol}</span></div>
                    <div class="forecast-desc">${day.description}</div>
                </div>
            `;
        });
    }

    // Renders severe weather alert banners, or hides the container if none exist
    function renderAlerts(alerts) {
        const container = document.getElementById('alertsContainer');
        if (!alerts || alerts.length === 0) {
            container.style.display = 'none';
            container.innerHTML = '';
            return;
        }
        container.style.display = 'block';
        container.innerHTML = alerts.map(a => `
            <div class="alert-banner" onclick="this.classList.toggle('open')">
                <div class="alert-header">
                    <span class="alert-icon">⚠️</span>
                    <span>Severe Weather Alert: ${a.event}</span>
                    <span style="margin-left:auto; font-size:12px; opacity:0.6;">click to expand</span>
                </div>
                <div class="alert-body">${a.description}</div>
            </div>
        `).join('');
    }

    // Sends the current city to the Flask backend to be saved in the session
    function saveCurrentCity() {
        if (!currentCity) return;
        fetch('/save_city', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ city: currentCity })
        })
        .then(res => res.json())
        .then(data => renderSavedCities(data.saved_cities));
    }

    // Sends a request to remove a city from the saved cities session list
    function removeCity(event, city) {
        event.stopPropagation();
        fetch('/remove_city', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ city })
        })
        .then(res => res.json())
        .then(data => renderSavedCities(data.saved_cities));
    }

    // Re-renders the saved city chips after a save or remove action
    function renderSavedCities(cities) {
        const container = document.getElementById('savedCities');
        container.innerHTML = cities.map(city => `
            <div class="city-chip" data-city="${city}">
                <span onclick="searchCity('${city}')">${city}</span>
                <button class="remove-btn" onclick="removeCity(event, '${city}')">×</button>
            </div>
        `).join('');
    }
</script>
</body>
</html>
